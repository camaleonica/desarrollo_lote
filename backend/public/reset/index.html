<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loté · Restablecer contraseña</title>
  <style>
    :root { --brown:#5c4033; --teal:#2f7f7a; --border:#d0d5dd; }
    body { font-family: "Segoe UI", sans-serif; background:#f4f7fb; margin:0; min-height:100vh; display:grid; place-items:center; padding:1rem; }
    .card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:1.5rem; width:min(420px,100%); box-shadow:0 8px 24px rgba(16,24,40,.08); }
    h1 { margin:0 0 .25rem; color:var(--brown); font-size:1.25rem; }
    p { color:#667085; line-height:1.5; }
    label { display:block; font-weight:600; margin:1rem 0 .35rem; font-size:.9rem; }
    input { width:100%; padding:.65rem .75rem; border:1px solid var(--border); border-radius:10px; font:inherit; }
    button { margin-top:1rem; width:100%; padding:.7rem; border:none; border-radius:10px; background:var(--teal); color:#fff; font-weight:600; cursor:pointer; }
    .msg { margin-top:1rem; padding:.75rem; border-radius:10px; display:none; }
    .msg.ok { display:block; background:#ecfdf3; color:#027a48; }
    .msg.error { display:block; background:#fef3f2; color:#b42318; }
    .hint { font-size:.85rem; margin-top:1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Restablecer contraseña</h1>
    <p>Elegí una contraseña nueva para tu cuenta Loté (mínimo 8 caracteres).</p>
    <form id="form">
      <label for="password">Nueva contraseña</label>
      <input id="password" type="password" minlength="8" required />
      <label for="password2">Confirmar contraseña</label>
      <input id="password2" type="password" minlength="8" required />
      <button type="submit">Guardar contraseña</button>
    </form>
    <div id="msg" class="msg"></div>
    <p class="hint">Después volvé a la app mobile e iniciá sesión con la nueva clave.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const msg = document.getElementById('msg');

    if (!token) {
      msg.textContent = 'Enlace inválido: falta el token. Pedí un nuevo reset desde la app.';
      msg.className = 'msg error';
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const p1 = document.getElementById('password').value;
      const p2 = document.getElementById('password2').value;
      if (p1 !== p2) {
        msg.textContent = 'Las contraseñas no coinciden.';
        msg.className = 'msg error';
        return;
      }
      try {
        const res = await fetch(`${window.location.origin}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: p1 }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || 'No se pudo restablecer');
        msg.textContent = data.message || 'Contraseña actualizada. Ya podés ingresar en la app.';
        msg.className = 'msg ok';
        e.target.querySelector('button').disabled = true;
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
      }
    });
  </script>
</body>
</html>
